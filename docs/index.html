<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>我的技术文档</title>
    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__inner">
        <a class="brand" href="./">文章存档</a>
        <nav class="topbar__nav">
          <a class="topbar__link is-active" href="./">按日期排列</a>
        </nav>
      </div>
    </header>

    <main class="layout">
      <section class="card content">
        <div class="content__header">
          <h1 class="content__title">最新文章</h1>
          <div class="content__meta" id="latest-meta"></div>
        </div>

        <div class="divider"></div>
        <ul class="post-list" id="latest-list"></ul>
      </section>

      <aside class="card sidebar">
        <h2 class="sidebar__title">分类</h2>
        <div class="divider"></div>
        <ul class="cat-list" id="cat-list"></ul>
      </aside>
    </main>

    <script type="module" src="assets/app.js"></script>
  </body>
</html>
