<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>文章</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <link rel="stylesheet" href="assets/clean-blog.css" />
    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light" id="mainNav" data-nav>
      <div class="container-fluid px-4 px-lg-5">
        <a class="navbar-brand" href="./">Auroral</a>
        <button class="navbar-toggler" type="button" data-action="nav-toggle" aria-controls="navbarResponsive" aria-expanded="false">
          菜单
        </button>
        <div class="collapse navbar-collapse" id="navbarResponsive" data-nav-collapse>
          <ul class="navbar-nav ms-auto py-4 py-lg-0">
            <li class="nav-item">
              <a class="nav-link px-lg-3 py-3 py-lg-4" href="./">
                <span class="nav-ico" aria-hidden="true">
                  <svg viewBox="0 0 24 24">
                    <path d="M3 10.5 12 3l9 7.5"></path>
                    <path d="M6.5 10.5V21h11V10.5"></path>
                  </svg>
                </span>
                <span>HOME</span>
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link px-lg-3 py-3 py-lg-4" href="article.html">
                <span class="nav-ico" aria-hidden="true">
                  <svg viewBox="0 0 24 24">
                    <path d="M7 3h10l4 4v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"></path>
                    <path d="M17 3v5h5"></path>
                    <path d="M8 13h8"></path>
                    <path d="M8 17h8"></path>
                  </svg>
                </span>
                <span>ARTICLE</span>
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link px-lg-3 py-3 py-lg-4" href="about.html">
                <span class="nav-ico" aria-hidden="true">
                  <svg viewBox="0 0 24 24">
                    <path d="M20 21a8 8 0 0 0-16 0"></path>
                    <path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4z"></path>
                  </svg>
                </span>
                <span>ABOUT</span>
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link px-lg-3 py-3 py-lg-4" href="contact.html">
                <span class="nav-ico" aria-hidden="true">
                  <svg viewBox="0 0 24 24">
                    <path d="M4 6h16v12H4z"></path>
                    <path d="m4 7 8 6 8-6"></path>
                  </svg>
                </span>
                <span>CONTACT</span>
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <header class="masthead" style="background-image: url('assets/img/post-bg.jpg')">
      <div class="container position-relative px-4 px-lg-5">
        <div class="row gx-4 gx-lg-5 justify-content-center">
          <div class="col-md-10 col-lg-8 col-xl-7">
            <div class="post-heading">
              <h1 id="post-title">文章</h1>
              <div class="blog-postMeta" id="post-meta"></div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="container px-4 px-lg-5">
      <div class="row gx-4 gx-lg-5 justify-content-center">
        <div class="col-md-10 col-lg-8 col-xl-7">
          <div class="post-frame__wrap" id="post-frame-wrap">
            <div id="post-placeholder" class="post-placeholder" hidden></div>
            <iframe
              id="post-frame"
              class="post-frame"
              title="post"
              loading="lazy"
              referrerpolicy="no-referrer"
            ></iframe>
          </div>
        </div>

        <aside class="col-lg-4 blog-sidebar">
          <div class="blog-sidebar__card">
            <div class="blog-sidebar__title">分类</div>
            <ul class="cat-list" id="cat-list"></ul>
          </div>
        </aside>
      </div>
    </main>

    <footer class="border-top">
      <div class="container px-4 px-lg-5">
        <div class="row gx-4 gx-lg-5 justify-content-center">
          <div class="col-md-10 col-lg-8 col-xl-7">
            <div class="small text-center text-muted fst-italic">© <span id="footer-year"></span> · Powered by GitHub Pages</div>
          </div>
        </div>
      </div>
    </footer>

    <script type="module" src="assets/app.js"></script>
  </body>
</html>
