    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body>

            <li class="nav-item">
              <a class="nav-link px-lg-3 py-3 py-lg-4" href="./">
                <span class="nav-ico" aria-hidden="true">
                  <svg viewBox="0 0 24 24">
                    <path d="m3 9 9-7 9 7"></path>
                    <path d="M9 22V12h6v10"></path>
                    <path d="M5 10v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V10"></path>
                  </svg>
                </span>
                <span>HOME</span>
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link px-lg-3 py-3 py-lg-4" href="article.html">
                <span class="nav-ico" aria-hidden="true">
                  <svg viewBox="0 0 24 24">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <path d="M14 2v6h6"></path>
                    <path d="M16 13H8"></path>
                    <path d="M16 17H8"></path>
                  </svg>
                </span>
                <span>ARTICLE</span>
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link px-lg-3 py-3 py-lg-4" href="about.html">
                <span class="nav-ico" aria-hidden="true">
                  <svg viewBox="0 0 24 24">
                    <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                  </svg>
                </span>
                <span>ABOUT</span>
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link px-lg-3 py-3 py-lg-4" href="contact.html">
                <span class="nav-ico" aria-hidden="true">
                  <svg viewBox="0 0 24 24">
                    <rect width="20" height="16" x="2" y="4" rx="2"></rect>
                    <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>

                </span>

            </li>
          </ul>
        </div>
      </div>
    </nav>

    <header class="masthead" style="background-image: url('assets/img/post-bg.jpg')">
      <div class="container position-relative px-4 px-lg-5">
        <div class="row gx-4 gx-lg-5 justify-content-center">
          <div class="col-md-10 col-lg-8 col-xl-7">
            <div class="post-heading">
              <h1 id="post-title">文章</h1>
              <div class="blog-postMeta" id="post-meta"></div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="container px-4 px-lg-5">
      <div class="row gx-4 gx-lg-5 justify-content-center">
        <div class="col-md-10 col-lg-8 col-xl-7">
          <div class="post-frame__wrap" id="post-frame-wrap">
            <div id="post-placeholder" class="post-placeholder" hidden></div>
            <iframe
              id="post-frame"
              class="post-frame"
              title="post"
              loading="lazy"
              referrerpolicy="no-referrer"
            ></iframe>
          </div>
        </div>

        <aside class="col-lg-4 blog-sidebar">
          <div class="blog-sidebar__card">
            <div class="blog-sidebar__title">分类</div>
            <ul class="cat-list" id="cat-list"></ul>
          </div>
        </aside>
      </div>
    </main>

    <footer class="border-top">
      <div class="container px-4 px-lg-5">
        <div class="row gx-4 gx-lg-5 justify-content-center">
          <div class="col-md-10 col-lg-8 col-xl-7">
            <div class="small text-center text-muted fst-italic">© <span id="footer-year"></span> · Powered by GitHub Pages</div>
          </div>
        </div>
      </div>
    </footer>

    <script type="module" src="assets/app.js"></script>
