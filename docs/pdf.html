<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PDF</title>
    <link rel="stylesheet" href="assets/style.css" />
    <link rel="stylesheet" href="assets/pdf-viewer.css" />
  </head>
  <body class="pdf-page">
    <header class="pdf-topbar">
      <div class="pdf-topbar__inner">
        <div class="pdf-brand">
          <span class="pdf-brand__title" id="pdf-title">PDF</span>
          <span class="pdf-brand__meta" id="pdf-subtitle"></span>
        </div>

        <div class="pdf-controls" role="toolbar" aria-label="PDF controls">
          <select id="mode-select" class="pdf-select" aria-label="View mode">
            <option value="scroll" selected>滚动</option>
            <option value="page">翻页</option>
          </select>

          <select id="theme-select" class="pdf-select" aria-label="Theme">
            <option value="system" selected>跟随系统</option>
            <option value="light">亮色</option>
            <option value="dark">暗色</option>
          </select>

          <button class="pdf-btn" type="button" id="prev-page" title="上一页 (←)">
            ‹
          </button>
          <div class="pdf-pagebox">
            <input id="page-number" class="pdf-input" inputmode="numeric" aria-label="Page number" />
            <span class="pdf-pagebox__sep">/</span>
            <span id="page-count" class="pdf-pagebox__count">?</span>
          </div>
          <button class="pdf-btn" type="button" id="next-page" title="下一页 (→)">
            ›
          </button>

          <span class="pdf-divider" aria-hidden="true"></span>

          <button class="pdf-btn" type="button" id="zoom-out" title="缩小 (-)">−</button>
          <select id="zoom-select" class="pdf-select" aria-label="Zoom">
            <option value="page-width" selected>适合宽度</option>
            <option value="page-fit">适合页面</option>
            <option value="0.5">50%</option>
            <option value="0.75">75%</option>
            <option value="1">100%</option>
            <option value="1.25">125%</option>
            <option value="1.5">150%</option>
            <option value="2">200%</option>
          </select>
          <button class="pdf-btn" type="button" id="zoom-in" title="放大 (+)">+</button>

          <span class="pdf-divider" aria-hidden="true"></span>

          <button class="pdf-btn" type="button" id="rotate" title="旋转 (R)">⟳</button>
          <a class="pdf-btn pdf-btn--link" id="open-raw" target="_blank" rel="noopener noreferrer" title="新窗口打开原始 PDF">
            原始
          </a>
          <a class="pdf-btn pdf-btn--link" id="download" download title="下载 PDF">下载</a>
        </div>
      </div>
    </header>

    <main class="pdf-main">
      <div class="pdf-stage" id="stage" aria-label="PDF page viewport">
        <div class="pdf-loading" id="loading">
          <div class="pdf-loading__spinner" aria-hidden="true"></div>
          <div class="pdf-loading__text" id="loading-text">正在加载…</div>
        </div>
        <div class="pdf-error" id="error" hidden></div>
        <div class="pdf-view" id="view-page" hidden>
          <div class="pdf-canvasWrap" id="canvas-wrap">
            <div class="pdf-pageLayer" id="single-layer">
              <canvas id="pdf-canvas" class="pdf-canvas"></canvas>
              <div id="anno-layer" class="pdf-annoLayer" aria-hidden="true"></div>
            </div>
          </div>
        </div>
        <div class="pdf-view" id="view-scroll" hidden>
          <div class="pdf-pages" id="pages" aria-label="PDF pages"></div>
        </div>
      </div>
    </main>

    <!-- PDF.js (CDN). If you prefer offline, vendor these files into docs/assets/ and update URLs. -->
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script type="module" src="assets/pdf-viewer.js"></script>
  </body>
</html>
