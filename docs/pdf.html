<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PDF</title>
    <link rel="stylesheet" href="assets/style.css?v=20260305" />
    <link rel="stylesheet" href="assets/pdf-viewer.css?v=20260305c" />
  </head>
  <body class="pdf-page">
    <header class="pdf-topbar">
      <div class="pdf-topbar__inner">
        <div class="pdf-brand">
          <span class="pdf-brand__title" id="pdf-title">PDF</span>
          <span class="pdf-brand__meta" id="pdf-subtitle"></span>
        </div>

        <div class="pdf-controls" role="toolbar" aria-label="PDF controls">
          <div class="pdf-controls__row">
            <div class="pdf-dd" id="dd-mode" title="阅读方式：连续滚动或单页翻页">
              <span class="pdf-dd__label">模式</span>
              <button class="pdf-dd__btn" type="button" id="mode-btn" aria-haspopup="listbox" aria-expanded="false"></button>
              <div class="pdf-dd__menu" id="mode-menu" role="listbox" aria-label="View mode" hidden>
                <button class="pdf-dd__opt" type="button" role="option" data-value="scroll">滚动（连续）</button>
                <button class="pdf-dd__opt" type="button" role="option" data-value="page">翻页（单页）</button>
              </div>
            </div>

            <div class="pdf-dd" id="dd-theme" title="主题：亮色/暗色/跟随系统">
              <span class="pdf-dd__label">主题</span>
              <button class="pdf-dd__btn" type="button" id="theme-btn" aria-haspopup="listbox" aria-expanded="false"></button>
              <div class="pdf-dd__menu" id="theme-menu" role="listbox" aria-label="Theme" hidden>
                <button class="pdf-dd__opt" type="button" role="option" data-value="system">跟随系统（推荐）</button>
                <button class="pdf-dd__opt" type="button" role="option" data-value="light">亮色</button>
                <button class="pdf-dd__opt" type="button" role="option" data-value="dark">暗色</button>
              </div>
            </div>

            <div class="pdf-stepper" title="缩放：适合宽度/适合页面/百分比">
              <button class="pdf-btn" type="button" id="zoom-out" title="缩小 (-)">−</button>
              <div class="pdf-dd" id="dd-zoom">
                <span class="pdf-dd__label">缩放</span>
                <button class="pdf-dd__btn" type="button" id="zoom-btn" aria-haspopup="listbox" aria-expanded="false"></button>
                <div class="pdf-dd__menu" id="zoom-menu" role="listbox" aria-label="Zoom" hidden>
                  <button class="pdf-dd__opt" type="button" role="option" data-value="page-width">适合宽度（推荐）</button>
                  <button class="pdf-dd__opt" type="button" role="option" data-value="page-fit">适合页面（整页）</button>
                  <div class="pdf-dd__sep" aria-hidden="true"></div>
                  <button class="pdf-dd__opt" type="button" role="option" data-value="0.5">50%</button>
                  <button class="pdf-dd__opt" type="button" role="option" data-value="0.75">75%</button>
                  <button class="pdf-dd__opt" type="button" role="option" data-value="1">100%</button>
                  <button class="pdf-dd__opt" type="button" role="option" data-value="1.25">125%</button>
                  <button class="pdf-dd__opt" type="button" role="option" data-value="1.5">150%</button>
                  <button class="pdf-dd__opt" type="button" role="option" data-value="2">200%</button>
                </div>
              </div>
              <button class="pdf-btn" type="button" id="zoom-in" title="放大 (+)">+</button>
            </div>
          </div>

          <div class="pdf-controls__row">
            <div class="pdf-nav" title="输入页码并回车跳转；←/→ 翻页">
              <button class="pdf-btn" type="button" id="prev-page" title="上一页 (←)">‹</button>
              <div class="pdf-counter" aria-label="Page counter">
                <span class="pdf-counter__label">页</span>
                <input id="page-number" class="pdf-input" inputmode="numeric" aria-label="Page number" />
                <span class="pdf-counter__sep">/</span>
                <span id="page-count" class="pdf-counter__count">?</span>
              </div>
              <button class="pdf-btn" type="button" id="next-page" title="下一页 (→)">›</button>
            </div>

            <div class="pdf-tools">
              <button class="pdf-btn" type="button" id="rotate" title="旋转 (R)">⟳</button>
              <a
                class="pdf-btn pdf-btn--link"
                id="open-raw"
                target="_blank"
                rel="noopener noreferrer"
                title="新窗口打开原始 PDF"
              >
                原始
              </a>
              <a class="pdf-btn pdf-btn--link" id="download" download title="下载 PDF">下载</a>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="pdf-main">
      <div class="pdf-stage" id="stage" aria-label="PDF page viewport">
        <div class="pdf-loading" id="loading">
          <div class="pdf-loading__spinner" aria-hidden="true"></div>
          <div class="pdf-loading__text" id="loading-text">正在加载…</div>
        </div>
        <div class="pdf-error" id="error" hidden></div>
        <div class="pdf-view" id="view-page" hidden>
          <div class="pdf-canvasWrap" id="canvas-wrap">
            <div class="pdf-pageLayer" id="single-layer">
              <canvas id="pdf-canvas" class="pdf-canvas"></canvas>
              <div id="anno-layer" class="pdf-annoLayer" aria-hidden="true"></div>
            </div>
          </div>
        </div>
        <div class="pdf-view" id="view-scroll" hidden>
          <div class="pdf-pages" id="pages" aria-label="PDF pages"></div>
        </div>
      </div>
    </main>

    <!-- PDF.js (CDN). If you prefer offline, vendor these files into docs/assets/ and update URLs. -->
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script type="module" src="assets/pdf-viewer.js?v=20260305c"></script>
  </body>
</html>
